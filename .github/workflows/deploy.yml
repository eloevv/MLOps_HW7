name: Model Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline and save artifacts
        run: python ml_pipeline.py

      - name: Make pipeline reproducible
        run: |
          pip freeze > requirements.lock
          echo "GIT_COMMIT=${{ github.sha }}" >> pipeline.env
          echo "MODEL_VERSION=${{ secrets.MODEL_VERSION }}" >> pipeline.env
          python -c "
          import json, hashlib, pathlib
          hp = json.loads(pathlib.Path('artifacts/hyperparameters.json').read_text())
          metrics = json.loads(pathlib.Path('artifacts/metrics.json').read_text())
          lock_hash = hashlib.sha256(pathlib.Path('requirements.lock').read_bytes()).hexdigest()[:12]
          snapshot = {'commit': '${{ github.sha }}'[:12], 'hyperparameters': hp, 'metrics': metrics, 'requirements_hash': lock_hash}
          pathlib.Path('artifacts/snapshot.json').write_text(json.dumps(snapshot, indent=2))
          print(json.dumps(snapshot, indent=2))
          "

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:${{ github.sha }} .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy via API
        run: |
          curl -X POST https://api.cloudprovider/deploy \
            -H "Authorization: Bearer ${{ secrets.CLOUD_TOKEN }}" \
            -d "image=ghcr.io/${{ github.repository }}:${{ github.sha }}"

      - name: Health check after deploy
        run: |
          sleep 10
          curl -f https://your-app/health || echo "Health check failed — check deployment logs"
